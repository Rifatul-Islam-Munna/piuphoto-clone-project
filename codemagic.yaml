workflows:
  ios_unsigned_ipa:
    name: iOS Unsigned IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    working_directory: mobileapp

    environment:
      flutter: stable
      xcode: latest
      vars:
        APP_NAME: Runner

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Build iOS without codesign
        script: |
          flutter build ios --release --no-codesign --build-number=$BUILD_NUMBER
      - name: Pack unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -R "$APP_NAME.app" Payload/
          zip -r "$APP_NAME-unsigned.ipa" Payload
          mv "$APP_NAME-unsigned.ipa" ../

    artifacts:
      - build/ios/*.ipa
      - build/ios/iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
